services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: decentrafi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d decentrafi"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      HOST: 0.0.0.0
      PORT: 3001
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/decentrafi
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: http://localhost:5173,http://frontend:3000,http://localhost:3000
      CACHE_TTL_CAMPAIGNS_LIST_SECONDS: 30
      CACHE_TTL_CAMPAIGNS_SEARCH_SECONDS: 20
      CACHE_TTL_CAMPAIGN_DETAIL_SECONDS: 20
      CACHE_TTL_RECOMMENDATIONS_SECONDS: 60
      CACHE_TTL_REPORTS_SECONDS: 30
      CACHE_TTL_REPORTED_CAMPAIGNS_SECONDS: 30
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health | grep -q ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://backend:3001
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
